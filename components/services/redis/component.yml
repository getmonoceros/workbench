id: redis
category: service
displayName: Redis
description: 'Redis on the default port with a readiness healthcheck. Reachable in-container as host `redis`.'
service:
  image: redis:8
  defaultPort: 6379
  dataMount: /data
  healthcheck:
    test: [CMD, redis-cli, ping]
    interval: 10s
    timeout: 5s
    retries: 5
  vscodeExtensions: [cweijan.vscode-database-client2]
  connectionEnv:
    URL: redis://${host}:${port}
    HOST: ${host}
    PORT: ${port}
