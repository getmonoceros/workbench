name: Release Features

# Triggered when something under components/features/ lands on main. The
# workflow generates each feature's devcontainer-feature.json from its
# component.yml descriptor (ADR 0020), then iterates all feature directories,
# reads the version from each generated manifest, and only publishes features
# whose version isn't already in GHCR. The `version` in the descriptor's
# `feature:` block is the entire release signal — no tags, no manual buttons.
#
# Generic over N features: a new `components/features/<name>/` directory is
# picked up by the loop automatically, no workflow change needed.
#
# Per ADR 0004 § "Version-getriggerte Pipelines".
on:
  push:
    branches: [main]
    paths:
      - 'components/features/**'
  # Manual trigger as a safety net (re-run after fixing the workflow,
  # bootstrapping a new feature without a code change, etc).
  workflow_dispatch:

permissions:
  contents: read
  # Required for the workflow GITHUB_TOKEN to push OCI artifacts to
  # ghcr.io/getmonoceros/monoceros-features/*.
  packages: write

# Don't cancel an in-flight publish if another commit lands — let it
# finish, the next run will pick up whatever's new after that.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  precheck:
    uses: ./.github/workflows/precheck.yml

  # e2e smoke gates the GHCR publish too: no feature artifact ships
  # while the end-to-end suite is red. Note e2e installs the CLI from a
  # packed tarball and pulls features from GHCR at their pinned
  # versions, so it does NOT build the branch's feature source — for a
  # feature-only change this is a health gate on the CLI + scenarios,
  # not a test of the changed feature itself. Proper per-feature e2e
  # coverage (building features from branch) is a separate follow-up.
  e2e:
    uses: ./.github/workflows/e2e-smoke.yml
    secrets: inherit

  publish:
    name: publish updated features
    needs: [precheck, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Generate each feature's devcontainer-feature.json from its
      # component.yml descriptor (ADR 0020) — the json is a build artifact,
      # not committed. The publish step packages each components/features/<id>/
      # dir (install.sh + the freshly generated manifest).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate feature manifests
        run: pnpm --filter @getmonoceros/workbench manifests:generate

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish features with bumped versions
        env:
          NAMESPACE: getmonoceros/monoceros-features
        run: |
          set -euo pipefail
          shopt -s nullglob

          published=()
          skipped=()

          for dir in components/features/*/; do
            manifest="$dir/devcontainer-feature.json"
            [[ -f "$manifest" ]] || continue

            name=$(jq -r .id "$manifest")
            version=$(jq -r .version "$manifest")
            ref="ghcr.io/$NAMESPACE/$name:$version"

            if docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "::notice title=skip::$name@$version already in registry"
              skipped+=("$name@$version")
              continue
            fi

            echo "::notice title=publish::$name@$version → $ref"
            npx -y @devcontainers/cli features publish \
              --namespace "$NAMESPACE" \
              "$dir"
            published+=("$name@$version")
          done

          {
            echo "## Features Release Summary"
            echo
            if [[ ${#published[@]} -gt 0 ]]; then
              echo "**Published (${#published[@]}):**"
              printf -- "- %s\n" "${published[@]}"
            else
              echo "**Published:** none — every feature's manifest version was already in GHCR."
            fi
            echo
            if [[ ${#skipped[@]} -gt 0 ]]; then
              echo "**Skipped (${#skipped[@]}):**"
              printf -- "- %s\n" "${skipped[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
