name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same ref —
# pushing a fix to a PR shouldn't keep the previous run alive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # pnpm before node so `actions/setup-node` can pick `cache: pnpm`
      # up. The version comes from the `packageManager` field in the
      # root package.json — keeps CI and local in lockstep without a
      # second source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check
