name: Release Runtime

# Triggered when anything under images/runtime/ lands on main. The
# workflow reads the version from images/runtime/VERSION and only
# rebuilds + pushes when that version isn't already in GHCR. Bumping
# VERSION is the entire release signal — no tags, no manual buttons.
#
# Multi-arch (linux/amd64 + linux/arm64) so the same image works on
# Apple Silicon, Intel Mac, Windows x64, Windows arm64 and native
# Linux hosts — the Linux-container architecture follows whichever
# Linux runs inside the host's Docker (WSL2 on Windows,
# Docker-Desktop-VM on macOS).
#
# Per ADR 0004 § "Version-getriggerte Pipelines".
on:
  push:
    branches: [main]
    paths:
      - 'images/runtime/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: build + push runtime image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/getmonoceros/monoceros-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < images/runtime/VERSION)
          if [[ -z "$version" ]]; then
            echo "::error::images/runtime/VERSION is empty"
            exit 1
          fi
          major="${version%%.*}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major"     >> "$GITHUB_OUTPUT"
          echo "::notice::version=$version major=$major"

      - name: Check if version is already published
        id: check
        run: |
          set -euo pipefail
          ref="$IMAGE:${{ steps.ver.outputs.version }}"
          if docker manifest inspect "$ref" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=skip::$ref already in registry"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=build::$ref needs publishing"
          fi

      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (multi-arch)
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: images/runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.major }}
            ${{ env.IMAGE }}:latest
          provenance: false

      - name: Summary
        run: |
          {
            echo "## Runtime Release Summary"
            echo
            if [[ "${{ steps.check.outputs.skip }}" == "true" ]]; then
              echo "**Skipped:** \`$IMAGE:${{ steps.ver.outputs.version }}\` was already in GHCR."
            else
              echo "**Published:** \`$IMAGE:${{ steps.ver.outputs.version }}\` (+ \`:${{ steps.ver.outputs.major }}\` + \`:latest\`)"
              echo
              echo "Platforms: \`linux/amd64\`, \`linux/arm64\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
