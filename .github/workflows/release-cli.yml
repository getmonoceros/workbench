name: Release CLI

# Triggered when anything under packages/cli/ lands on main. The
# workflow reads the version from packages/cli/package.json and only
# publishes if that version isn't already in the npm registry under
# `@getmonoceros/workbench`. Bumping the manifest version is the
# entire release signal — analog zu release-features und
# release-runtime, siehe ADR 0004 + ADR 0005.
#
# Authentication is via npm Trusted Publishing (OIDC) — no
# long-lived NPM_TOKEN, no repository secret. The matching
# Trusted Publisher must be configured once on
# https://www.npmjs.com/package/@getmonoceros/workbench/access
# (org `getmonoceros`, repo `workbench`, this workflow's filename).
# That configuration only becomes possible after the package exists,
# so the initial `1.0.0` publish happens manually from a maintainer's
# machine; subsequent version-bumps go through this workflow.
#
# Distribution: npm registry. Builders installieren entweder direkt
# via `npm install -g @getmonoceros/workbench` oder über das
# install.sh / install.ps1 Bouncer-Skript im Repo-Root.
on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
  workflow_dispatch:

permissions:
  contents: read
  # Required by npm Trusted Publishing — lets the workflow ask
  # GitHub's OIDC provider for a short-lived token that the npm
  # registry trusts via the package's configured Trusted Publisher.
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish @getmonoceros/workbench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PACKAGE: '@getmonoceros/workbench'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >= 11, which is the minimum for
          # OIDC trusted publishing. Node 22 has npm 10.9.x and
          # would need an in-place self-upgrade that hits
          # https://github.com/nodejs/node/issues/62430. Precheck
          # stays on Node 22 (matches local), only the release-cli
          # workflow needs the newer npm.
          node-version: 24
          cache: pnpm
          # Tells setup-node + npm to publish against the public
          # registry. No auth token here — that's the whole point of
          # OIDC trusted publishing.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: ver
        run: |
          set -euo pipefail
          version=$(jq -r .version packages/cli/package.json)
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::packages/cli/package.json has no version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::version=$version"

      - name: Check if version is already published
        id: check
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          existing=$(npm view "$PACKAGE@$version" version 2>/dev/null || true)
          if [[ -n "$existing" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=skip::$PACKAGE@$version already on npm"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=publish::$PACKAGE@$version needs publishing"
          fi

      - name: Publish to npm (OIDC)
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/cli
        # `prepublishOnly` in packages/cli/package.json runs typecheck
        # + test + build before npm assembles the tarball. No
        # NODE_AUTH_TOKEN — npm exchanges the OIDC token from GitHub
        # for a short-lived registry token at publish time. Provenance
        # is auto-attached for trusted-publishing runs, no explicit
        # --provenance flag needed.
        run: npm publish --access public

      - name: Summary
        run: |
          {
            echo "## CLI Release Summary"
            echo
            if [[ "${{ steps.check.outputs.skip }}" == "true" ]]; then
              echo "**Skipped:** \`$PACKAGE@${{ steps.ver.outputs.version }}\` was already on npm."
            else
              echo "**Published:** \`$PACKAGE@${{ steps.ver.outputs.version }}\` via OIDC trusted publishing"
              echo
              echo "Install: \`npm install -g $PACKAGE\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
