name: E2E Smoke

# Runs the maintainer-facing e2e suite (getmonoceros/monoceros-e2e)
# against the CURRENT workbench code on every PR / main push that
# touches the CLI. Catches regressions before they ever get to
# release-cli.yml — much cheaper than rolling back an npm publish.
#
# Why workbench installs from `npm pack` instead of `node dist/bin.js`
# directly: the install path is what end users hit (npm shim, bin
# mapping, global module resolution), and we've burned hours on
# install-pipeline bugs before — see the 1.11.x WSL bug-hunt and ADR
# 0011. The pack-and-install round trip exercises all of it.

on:
  push:
    branches: [main]
    paths: ['packages/cli/**']
  pull_request:
    paths: ['packages/cli/**']
  # Manual trigger for ad-hoc smoke runs (e.g. after a workbench
  # change that didn't touch packages/cli/ but you still want to
  # verify, or right after pushing the workflow itself).
  workflow_dispatch:

# Cancel an in-flight run on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: e2e --all
    runs-on: ubuntu-latest
    # `--all` runs seven scenarios end-to-end with real docker
    # container builds; the first run pulls the runtime image cold
    # (~1-2 min) plus apt-installs feature layers per scenario. 20
    # minutes is comfortably above what we've seen on a local Linux
    # box (~7-8 min) and leaves headroom for slow GH runners.
    timeout-minutes: 20

    steps:
      - name: Checkout workbench
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workbench dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workbench
        run: pnpm --filter @getmonoceros/workbench build

      - name: Install monoceros from packed tarball
        # `npm pack` produces the same tarball release-cli.yml would
        # publish; installing from it locally mimics the end-user
        # `install.sh` → `npm install -g @getmonoceros/workbench`
        # path closely. The shell glob expands to a single match
        # because npm pack only writes one tarball per invocation.
        working-directory: packages/cli
        run: |
          npm pack
          npm install -g ./getmonoceros-workbench-*.tgz
          monoceros --version

      - name: Configure git credential helper from GITHUB_TOKEN
        # monoceros apply pre-flight calls `git credential fill` for
        # every HTTPS host in the yml's `repos:` list. Even for public
        # repos like the e2e-fixture, no helper → "Missing Git
        # credentials" → apply bails.
        #
        # First attempt was `gh auth login --with-token` + `gh auth
        # setup-git`, but gh refuses to overwrite stored auth when
        # GH_TOKEN is already in the environment (and we need it
        # there for gh itself to be authenticated). Skipping gh
        # entirely and writing an inline credential helper that
        # returns the token from env is cleaner: no auth-state
        # plumbing, no env conflict, exact same effect for git's
        # `credential fill` query.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global credential.helper \
            '!f() { echo "username=x-access-token"; echo "password=$GH_TOKEN"; }; f'

      - name: Checkout e2e suite
        uses: actions/checkout@v4
        with:
          repository: getmonoceros/monoceros-e2e
          path: monoceros-e2e

      - name: Install + build e2e
        working-directory: monoceros-e2e
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run e2e --all
        working-directory: monoceros-e2e
        # The e2e tool detects GITHUB_ACTIONS=true and emits
        # ::error::/::notice:: annotations on top of the pretty
        # output, so failures surface in the PR check UI directly.
        run: node dist/bin.js run --all
