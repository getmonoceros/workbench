name: E2E Smoke

# Runs the maintainer-facing e2e suite (getmonoceros/monoceros-e2e)
# against the CURRENT workbench code. Invoked two ways:
#   - directly on PRs that touch the CLI, and
#   - as a REUSABLE GATE (workflow_call) from the release-*.yml
#     pipelines — their `publish` job `needs:` this run, so nothing
#     reaches npm or GHCR while e2e is red.
# On main there is deliberately NO direct push trigger: a main push
# that warrants e2e (CLI / features / runtime) already triggers a
# release-*.yml, which calls this workflow once. That keeps it to a
# single e2e run per push instead of a standalone + a gated duplicate.
# Catching a regression here is much cheaper than rolling back a
# publish.
#
# Why workbench installs from `npm pack` instead of `node dist/bin.js`
# directly: the install path is what end users hit (npm shim, bin
# mapping, global module resolution), and we've burned hours on
# install-pipeline bugs before — see the 1.11.x WSL bug-hunt and ADR
# 0011. The pack-and-install round trip exercises all of it.

on:
  pull_request:
    paths: ['packages/cli/**']
  # Reusable gate for the release-*.yml pipelines (see header).
  workflow_call:
  # Manual trigger for ad-hoc smoke runs (e.g. after a workbench
  # change that didn't touch packages/cli/ but you still want to
  # verify, or right after pushing the workflow itself).
  workflow_dispatch:

# Cancel an in-flight run on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: e2e --all
    runs-on: ubuntu-latest
    # `--all` runs seven scenarios end-to-end with real docker
    # container builds; the first run pulls the runtime image cold
    # (~1-2 min) plus apt-installs feature layers per scenario. 20
    # minutes is comfortably above what we've seen on a local Linux
    # box (~7-8 min) and leaves headroom for slow GH runners.
    timeout-minutes: 20

    # Job-level env so $GH_TOKEN is in scope for the credential
    # helper script we install below — that script runs later, in
    # the apply step's git subprocess, and would see an empty token
    # if GH_TOKEN were only set on the configure step.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Build the Monoceros features from THIS branch's source instead
      # of pulling the last-published GHCR artifacts — the feature-side
      # analogue of building the runtime image locally below. The
      # globally-installed (prod) CLI honours this override and copies
      # the branch feature source into each scenario's
      # `.devcontainer/features/`, so e2e gates the publish on the
      # feature code being released, not on a stale one. See
      # featuresSourceRoot in scaffold.ts.
      MONOCEROS_FEATURES_DIR_OVERRIDE: ${{ github.workspace }}/images/features

    steps:
      - name: Checkout workbench
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workbench dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workbench
        run: pnpm --filter @getmonoceros/workbench build

      - name: Build runtime image from this branch
        # The CLI pins new containers to the runtime version in
        # images/runtime/VERSION (ADR 0017), but that image only
        # publishes on merge (release-runtime.yml). Build + tag it
        # locally here so e2e applies resolve the pinned tag from the
        # local docker image store instead of pulling an unpublished
        # tag from the registry — and so e2e exercises the runtime image
        # as it exists ON THIS BRANCH, not the last published one.
        run: |
          version=$(tr -d '[:space:]' < images/runtime/VERSION)
          docker build -t "ghcr.io/getmonoceros/monoceros-runtime:${version}" images/runtime

      - name: Install monoceros from packed tarball
        # `npm pack` produces the same tarball release-cli.yml would
        # publish; installing from it locally mimics the end-user
        # `install.sh` → `npm install -g @getmonoceros/workbench`
        # path closely. The shell glob expands to a single match
        # because npm pack only writes one tarball per invocation.
        working-directory: packages/cli
        run: |
          npm pack
          npm install -g ./getmonoceros-workbench-*.tgz
          monoceros --version

      - name: Configure git credential helper from GITHUB_TOKEN
        # monoceros apply pre-flight calls `git credential fill` for
        # every HTTPS host in the yml's `repos:` list. Even for public
        # repos like the e2e-fixture, no helper → "Missing Git
        # credentials" → apply bails.
        #
        # The inline helper reads $GH_TOKEN from env — which is set
        # at the JOB level above so the variable is also present
        # when git invokes the helper later during the apply step.
        # First attempt set GH_TOKEN per-step here only, which made
        # the helper expand to an empty password downstream.
        run: |
          git config --global credential.helper \
            '!f() { echo "username=x-access-token"; echo "password=$GH_TOKEN"; }; f'

      - name: Checkout e2e suite
        uses: actions/checkout@v4
        with:
          repository: getmonoceros/monoceros-e2e
          path: monoceros-e2e

      - name: Install + build e2e
        working-directory: monoceros-e2e
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run e2e --all
        working-directory: monoceros-e2e
        # The e2e tool detects GITHUB_ACTIONS=true and emits
        # ::error::/::notice:: annotations on top of the pretty
        # output, so failures surface in the PR check UI directly.
        run: node dist/bin.js run --all
