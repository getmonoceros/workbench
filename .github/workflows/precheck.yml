name: Precheck

on:
  pull_request:
  push:
    branches: [main]
  # Reusable from the release-*.yml pipelines so a release cannot
  # bypass lint / typecheck / test / format. The called instance
  # runs under the CALLER's `github.workflow` value, which keeps the
  # concurrency group below distinct from the direct-trigger run
  # (no cross-cancellation between "Precheck" and "Release CLI →
  # precheck", they share repo state but not the queue lane).
  workflow_call:

# Cancel an in-flight run when a new commit lands on the same ref —
# pushing a fix to a PR shouldn't keep the previous run alive.
# The literal `precheck-` prefix is load-bearing: when a release-*.yml
# caller invokes BOTH this reusable workflow and e2e-smoke, both run
# under the caller's `github.workflow`, so a bare
# `${{ github.workflow }}-${{ github.ref }}` would collide between the
# two and, with cancel-in-progress, cancel each other. The per-workflow
# prefix keeps their lanes distinct (and still distinct from the direct
# "Precheck" trigger).
concurrency:
  group: precheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # pnpm before node so `actions/setup-node` can pick `cache: pnpm`
      # up. The version comes from the `packageManager` field in the
      # root package.json — keeps CI and local in lockstep without a
      # second source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # The committed catalog.json is served from the repo (via
      # raw.githubusercontent.com) and read by the onboarding skill, so it must
      # never drift from the descriptors or the CLI version. Regenerate it and
      # fail if the working tree changes — a stale catalog.json then cannot land
      # on main or pass the release gate. Fix locally with:
      #   pnpm --filter @getmonoceros/workbench catalog:json  (then commit)
      - name: Catalog JSON is current
        run: |
          pnpm --filter @getmonoceros/workbench catalog:json
          if ! git diff --quiet -- catalog.json; then
            echo "::error file=catalog.json::catalog.json is stale. Run 'pnpm --filter @getmonoceros/workbench catalog:json' and commit the result."
            git --no-pager diff -- catalog.json
            exit 1
          fi
