# Monoceros solution-config — `bare` template.
#
# The minimum useful container: Node base + Claude Code as a
# devcontainer feature. Customize via `monoceros add-*` or by editing
# this file directly to layer on Python / Java / Go / Rust / .NET, apt
# packages, services like Postgres, or git repos under `projects/`.
#
# `name` is replaced by `monoceros init <template> <name>` when this
# file is copied into `<MONOCEROS_HOME>/container-configs/<name>.yml`.

schemaVersion: 1
name: bare

features:
  - ref: ./features/claude-code
