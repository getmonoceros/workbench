# Monoceros solution-config — `reference` template.
#
# Exhaustive example showing every field the schema supports. Use this
# as a starting point when you want to see all options at once; comment
# out what you don't need, then run
#
#   monoceros init reference <name>
#
# to copy it into `.local/container-configs/<name>.yml`.
#
# The smaller templates (`bare`, `nodejs-github`, `python`) are usually
# the better starting point; this one is a reference, not a recommended
# default.

schemaVersion: 1
name: reference

# Language toolchains. `node` is in the base image. Other languages
# install a devcontainer feature from the curated catalog.
# languages:
#   - python

# apt packages. `make`, `jq`, `git`, `curl`, `ssh` are already in the
# base image — only list what's actually missing.
# aptPackages:
#   - postgresql-client

# Custom devcontainer features. Each entry takes an OCI-style ref and
# optional options. `options` is a free-form map (string / number /
# boolean values).
# features:
#   - ref: ghcr.io/devcontainers/features/github-cli:1
#   - ref: ghcr.io/devcontainers/features/docker-in-docker:2
#     options:
#       version: latest

# HTTPS install scripts executed inside post-create.sh, in order. Each
# URL is piped to `sh`. Audit before adding — these run arbitrary
# remote shell code at every container build.
# installUrls:
#   - https://starship.rs/install.sh

# Compose services that come up alongside the workspace container.
# Currently curated: postgres, mysql, redis. Adding a service switches
# the container to compose-mode (compose.yaml is generated).
# services:
#   - postgres

# Git repos cloned into projects/<name>/ during post-create. HTTPS auth
# uses the host credential helper automatically; SSH uses the host
# SSH-agent.
#   - url       (required) — HTTPS or SSH/git@ URL
#   - name      (optional) — folder name under projects/; defaults to
#                            the URL's last segment with `.git` stripped
#   - branch    (optional) — clone a non-default branch
# repos:
#   - url: https://github.com/your-org/api.git
#   - url: https://github.com/your-org/web.git
#     name: web-ui
#     branch: develop

# External-service escape hatch. When set, the corresponding compose
# service is NOT brought up — the container talks to your external
# instance instead. Mutually exclusive with the matching `services:`
# entry; the apply step strips the duplicate compose service.
# externalServices:
#   postgres: postgresql://user:pass@host:5432/db

# Git identity used inside the container. Overrides the global
# `<MONOCEROS_HOME>/monoceros-config.yml` defaults (when present) and
# the host-side `git config --global` fallback. Optional — leave
# unset to inherit.
# git:
#   user:
#     name: Your Name
#     email: you@example.com
