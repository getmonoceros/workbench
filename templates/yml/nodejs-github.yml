# Monoceros solution-config — `nodejs-github` template.
#
# Profile for a TypeScript/Node-first solution backed by GitHub repos.
# Bundles:
#   - Claude Code (Monoceros feature) — Anthropic's CLI
#   - GitHub CLI (`gh`) — official devcontainers feature
#
# Standard tools `git`, `curl`, `ssh`, `jq`, `make` are already in the
# base image — no apt-packages entries needed for them.
#
# HTTPS is the recommended default for `repos:` — `monoceros apply`
# fetches credentials from your host git credential helper (osxkeychain
# on macOS, GCM on Windows, libsecret on Linux, …). If `git clone`
# works on your host, it works in the container.
#
# Uncomment `repos:` and `services:` for your needs, then run
# `monoceros apply <name>` after `monoceros init`.

schemaVersion: 1
name: nodejs-github

features:
  - ref: ghcr.io/monoceros/features/claude-code:1
  - ref: ghcr.io/devcontainers/features/github-cli:1

# Add your first repo here. `name` defaults to the basename of the URL
# (`bar.git` → `bar`) — override only when you need a different folder
# under `projects/`.
# repos:
#   - url: https://github.com/your-org/your-repo.git

# Add a local Postgres service if your solution needs a DB. Inside the
# container the DB is reachable as host `postgres`:
#   postgresql://monoceros:monoceros@postgres:5432/monoceros
# Switch to an external DB by replacing this with
# `externalServices.postgres: postgresql://…`.
# services:
#   - postgres
