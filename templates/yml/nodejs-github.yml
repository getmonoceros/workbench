# Monoceros solution-config — `nodejs-github` template.
#
# Profile for a TypeScript/Node-first solution backed by GitHub repos.
# Node is in the base image (no feature needed). The container forwards
# the host SSH-agent automatically as soon as `repos:` is non-empty, so
# `git@github.com:…` URLs Just Work — provided your host has the right
# key loaded.
#
# Uncomment the `repos:` entry and edit it for your first repo, then
# run `monoceros apply <name>` from a fresh container directory.

schemaVersion: 1
name: nodejs-github

# Extras the base image doesn't ship. `make` is handy for repo-side
# Makefile targets; `jq` for shell-pipelining JSON.
aptPackages:
  - make
  - jq

# Add your first repo here. `name` defaults to the basename of the URL
# (`bar.git` → `bar`) — override only when you need a different folder
# under `projects/`.
# repos:
#   - url: git@github.com:your-org/your-repo.git
