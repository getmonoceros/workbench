# Monoceros — sample für `monoceros-config.yml`.
#
# Kopiere diese Datei nebenan als `monoceros-config.yml` und passe die
# Werte an. Die echte Datei ist gitignored. In Produktion liegt sie
# unter `~/.monoceros/monoceros-config.yml` (oder wo `MONOCEROS_HOME`
# hinzeigt).
#
# Diese Datei dient gleichzeitig als Detection-Marker für das
# workbench-interne `MONOCEROS_HOME` — bitte nicht umbenennen oder
# löschen.

schemaVersion: 1

# Defaults, die beim Materialisieren einer Solution-Config genommen
# werden, wenn die Container-yml selbst nichts angibt UND der Host
# kein global-Wert hat.
defaults:
  git:
    user:
      name: Your Name
      email: you@example.com

  # Default options for Monoceros-curated devcontainer features, keyed
  # by the OCI ref. Per-container yml options override these. The
  # feature itself decides what to do with the values — typically a
  # post-create hook does a non-interactive login.
  #
  # Uncomment and fill in the parts you actually use.
  # features:
  #   ghcr.io/monoceros/features/claude-code:1:
  #     apiKey: sk-ant-…              # optional → API-Modus
  #                                   # weglassen für Subscription/OAuth-Login
  #   ghcr.io/monoceros/features/atlassian:1:
  #     # Beide Tools sind defaultmäßig aktiv — auf false setzen
  #     # wenn du nur eines davon willst.
  #     # rovodev: false             # `acli` + Rovo Dev
  #     # twg: false                 # Teamwork Graph CLI
  #     instance: yoursite.atlassian.net  # nötig für twg-Auto-Login
  #     email: you@example.com
  #     apiToken: ATATT3xFf…
  #     # bitbucketToken: ATBB…      # optional, nur für Bitbucket-Kommandos in twg
  #     # Bei Rovo Dev fragt `acli rovodev run` die Site beim ersten
  #     # Lauf selbst ab und merkt sie sich im persistenten home-Mount.
